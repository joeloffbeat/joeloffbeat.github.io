<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel's Mindscape</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }

        /* --- Title --- */
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(14px, 2.5vw, 28px);
            color: #ffffff;
            background: #000000;
            padding: 16px 32px;
            text-shadow: 3px 3px 0px #333333;
            letter-spacing: 2px;
            border: 3px solid #444444;
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 10;
        }

        /* --- Entity Toast Popup --- */
        #entity-toast {
            position: fixed;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(8px, 1.5vw, 14px);
            color: #333333;
            background: rgba(255, 215, 0, 0.95);
            padding: 12px 24px;
            border: 3px solid #b8860b;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        #entity-toast .toast-icon { font-size: 1.2em; }
        #entity-toast .toast-desc { opacity: 0.7; }
        #entity-toast .toast-hint {
            margin-left: 8px;
            opacity: 0.6;
            font-size: 0.8em;
        }
        #entity-toast kbd {
            background: #333;
            color: #ffd700;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.9em;
        }

        /* --- Overlay --- */
        #overlay-container {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        #overlay-container.overlay-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #overlay-container.overlay-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
        }
        .overlay-content {
            position: relative;
            background: #1a1a2e;
            border: 3px solid #444;
            border-radius: 4px;
            width: min(90vw, 800px);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            font-family: 'Press Start 2P', monospace;
            color: #e0e0e0;
            transform: scale(1);
            animation: overlayIn 0.3s ease-out;
        }
        @keyframes overlayIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 2px solid #333;
        }
        .overlay-title {
            font-size: clamp(10px, 2vw, 16px);
            margin: 0;
        }
        .overlay-close {
            background: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay-close:hover { background: #555; }
        .overlay-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 70vh;
            font-size: clamp(7px, 1.2vw, 11px);
            line-height: 1.8;
        }

        /* --- Overlay Content Styles --- */
        .overlay-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .overlay-card {
            background: #16213e;
            border: 2px solid #2a3a5e;
            border-radius: 4px;
            overflow: hidden;
        }
        .card-cover {
            height: 80px;
        }
        .card-info {
            padding: 10px;
        }
        .card-title {
            font-size: clamp(7px, 1.1vw, 10px);
            margin-bottom: 4px;
            color: #fff;
        }
        .card-meta {
            font-size: clamp(6px, 0.9vw, 9px);
            color: #888;
        }
        .overlay-section {
            margin-bottom: 20px;
        }
        .overlay-section h3 {
            font-size: clamp(8px, 1.3vw, 12px);
            color: #4a9eff;
            margin-bottom: 12px;
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #16213e;
            padding: 12px;
            border: 2px solid #2a3a5e;
            border-radius: 4px;
        }
        .np-art {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .contact-card {
            background: #16213e;
            border: 2px solid #2a3a5e;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
        }
        .contact-name {
            font-size: clamp(12px, 2vw, 18px);
            color: #fff;
            margin-bottom: 16px;
        }
        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact-link {
            color: #4a9eff;
            text-decoration: none;
            font-size: clamp(7px, 1.1vw, 10px);
        }
        .contact-link:hover { color: #7ec8e3; }
        .project-lang {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: clamp(6px, 0.8vw, 8px);
            color: #aaa;
        }
        .lang-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .art-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .art-item {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: flex-end;
            padding: 6px;
        }
        .art-caption {
            font-size: clamp(5px, 0.7vw, 7px);
            color: rgba(255,255,255,0.7);
        }
        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .blog-entry {
            background: #16213e;
            border: 2px solid #2a3a5e;
            border-radius: 4px;
            padding: 14px;
        }
        .blog-excerpt {
            color: #999;
            margin: 8px 0;
            font-size: clamp(6px, 0.9vw, 9px);
        }
        .blog-link {
            color: #4a9eff;
            text-decoration: none;
            font-size: clamp(6px, 0.9vw, 9px);
        }
        .blog-link:hover { color: #7ec8e3; }
    </style>
</head>
<body>
    <div id="title">Joel's Mindscape</div>

    <div id="entity-toast">
        <span class="toast-icon"></span>
        <span class="toast-label"></span>
        <span class="toast-desc"></span>
        <span class="toast-hint">Click or press <kbd>E</kbd></span>
    </div>

    <div id="overlay-container" class="overlay-hidden">
        <div class="overlay-backdrop"></div>
        <div class="overlay-content">
            <div class="overlay-header">
                <h2 class="overlay-title"></h2>
                <button class="overlay-close">&times;</button>
            </div>
            <div class="overlay-body"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
